<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Login | FrutiFantastico</title>

    <style>

        body{
            margin:0;
            padding:0;
            font-family:Arial;
            background:linear-gradient(135deg,#ff9800,#ff5722);
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .contenedor{
            background:white;
            padding:40px;
            border-radius:20px;
            width:350px;
            text-align:center;
            box-shadow:0px 0px 20px rgba(0,0,0,0.2);
        }

        h1{
            color:#ff5722;
            margin-bottom:25px;
        }

        input{
            width:100%;
            padding:12px;
            margin-top:10px;
            border:none;
            border-radius:10px;
            background:#f2f2f2;
            font-size:16px;
        }

        button{
            width:100%;
            padding:12px;
            margin-top:20px;
            border:none;
            border-radius:10px;
            background:#ff5722;
            color:white;
            font-size:16px;
            cursor:pointer;
        }

        button:hover{
            background:#e64a19;
        }

        a{
            text-decoration:none;
            color:#ff5722;
            font-weight:bold;
        }

        p{
            color:red;
        }

        .links{
            margin-top:20px;
            display:flex;
            flex-direction:column;
            gap:10px;
        }

    </style>

</head>

<body>

    <div class="contenedor">

        <h1>FrutiFantastico</h1>

        <form method="POST">

            <input
            type="text"
            name="usuario"
            placeholder="Usuario"
            required
            >

            <input
            type="password"
            name="password"
            placeholder="Contraseña"
            required
            >

            <button type="submit">
                Iniciar Sesión
            </button>

        </form>

        <p>{{ mensaje }}</p>

        <div class="links">

            <a href="/registro">
                Crear cuenta
            </a>

            <a href="/forgot-password">
                Recuperar contraseña
            </a>

        </div>

    </div>

</body>

</html>
